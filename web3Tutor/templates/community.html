
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community | Web3 AI Tutor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="theme-transition">
    <div class="layout">
        <nav class="sidebar">
            <!-- Include your sidebar navigation here -->
        </nav>
        
        <main class="main-content">
            <div class="community-container">
                <div class="community-header">
                    <h1>Community Hub</h1>
                    <button class="btn btn-primary" onclick="createPost()">Create Post</button>
                </div>
                
                <div class="posts-container">
                    <div class="post-filters">
                        <button class="btn btn-sm active">All</button>
                        <button class="btn btn-sm">Questions</button>
                        <button class="btn btn-sm">Projects</button>
                        <button class="btn btn-sm">Events</button>
                    </div>
                    
                    <div id="postsList"></div>
                </div>
                
                <div class="community-sidebar">
                    <div class="trending-topics">
                        <h3>Trending Topics</h3>
                        <ul id="trendingList"></ul>
                    </div>
                    
                    <div class="active-users">
                        <h3>Active Users</h3>
                        <ul id="activeUsersList"></ul>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/community.js"></script>
</body>
</html>
