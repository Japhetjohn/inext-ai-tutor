
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iNext AI - Web3 Learning</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="{{ url_for('static', path='/css/styles.css') }}" rel="stylesheet">
</head>
<body class="{{ user.theme_preference or 'light' }}">
    <nav class="navbar">
        <div class="logo">iNext AI</div>
        <div class="nav-links">
            <a href="/dashboard">Dashboard</a>
            <a href="/chat">AI Chat</a>
            <a href="/achievements">Achievements</a>
            <a href="/community">Community</a>
            <a href="/settings">Settings</a>
        </div>
        <div class="user-info">
            <img src="{{ user.profile_photo or 'https://api.dicebear.com/7.x/initials/svg?seed=' + user.username }}" 
                 alt="Profile" class="avatar">
            <span>{{ user.username }}</span>
        </div>
    </nav>
    
    <main class="content">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', path='/js/scripts.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
